name: Export custom store addresses

on:
  workflow_dispatch:
    inputs:
      chain:
        description: "Store chain, for example REMA 1000"
        required: true
        type: string
      country:
        description: "Country in English, for example Norway"
        required: true
        type: string
      format:
        description: "Output format"
        required: false
        default: "CSV"
        type: string
      source:
        description: "Data source preference"
        required: false
        default: "OpenStreetMap"
        type: string
      job_id:
        description: "Unique job id from website"
        required: true
        type: string

permissions:
  contents: write
  actions: read

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas openpyxl

      - name: Show request
        run: |
          echo "Chain: ${{ inputs.chain }}"
          echo "Country: ${{ inputs.country }}"
          echo "Format: ${{ inputs.format }}"
          echo "Source: ${{ inputs.source }}"
          echo "Job ID: ${{ inputs.job_id }}"

      - name: Run export script
        run: |
          mkdir -p exports
          python -u scripts/export_osm.py \
            --country "${{ inputs.country }}" \
            --chain "${{ inputs.chain }}" \
            --out "exports/${{ inputs.job_id }}.csv"

      - name: Upload CSV as artifact
        uses: actions/upload-artifact@v4
        with:
          name: store-address-export-${{ inputs.job_id }}
          path: exports/${{ inputs.job_id }}.csv
          if-no-files-found: error

      - name: Commit CSV to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add "exports/${{ inputs.job_id }}.csv"

          if git diff --cached --quiet; then
            echo "No CSV changes to commit"
          else
            git commit -m "Add address export ${{ inputs.job_id }}"
            git pull --rebase
            git push
          fi
