<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Retail Address Finder</title>
  <link rel="stylesheet" href="/styles.css" />
</head>

<body>
  <main class="page">
    <section class="hero">
      <div class="badge">Retail Address Finder</div>
      <h1>Find and export store addresses</h1>
      <p class="lead">
        Ange butikskedja och land. Vi skapar en CSV med adress eller lat/lon via GitHub Actions.
      </p>
    </section>

    <section class="card">
      <form id="exportForm">
        <label>
          Chain
          <input
            id="chain"
            name="chain"
            type="text"
            placeholder="Ex. REMA 1000, Kiwi, Carrefour"
            required
          />
        </label>

        <label>
          Country
          <input
            id="country"
            name="country"
            type="text"
            placeholder="Ex. Norway, France, Netherlands"
            required
          />
        </label>

        <button type="submit">Generate file</button>
      </form>

      <div id="result" class="result hidden"></div>
    </section>

    <section class="examples">
      <h2>Examples</h2>
      <div class="grid">
        <button type="button" class="example" data-chain="REMA 1000" data-country="Norway">
          REMA 1000 in Norway
        </button>

        <button type="button" class="example" data-chain="Kiwi" data-country="Norway">
          Kiwi in Norway
        </button>

        <button type="button" class="example" data-chain="Carrefour" data-country="France">
          Carrefour in France
        </button>

        <button type="button" class="example" data-chain="Albert Heijn" data-country="Netherlands">
          Albert Heijn in Netherlands
        </button>
      </div>
    </section>
  </main>

  <script src="/app.js"></script>
</body>
</html>
